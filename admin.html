<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // আপনার কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyAumbU-7Eaaw0ivNrbBEB8PutkWvQSGBMQ",
        authDomain: "pixora-21c62.firebaseapp.com",
        projectId: "pixora-21c62",
        storageBucket: "pixora-21c62.firebasestorage.app",
        messagingSenderId: "997778712038",
        appId: "1:997778712038:web:25791b604601b456e6a227"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    // ১. প্রোডাক্ট অ্যাড করার বাটন লিসেনার (onclick-এর বিকল্প)
    document.getElementById("add-btn").addEventListener("click", async () => {
        const name = document.getElementById("p-name").value;
        const price = document.getElementById("p-price").value;

        if (name && price) {
            await addDoc(collection(db, "products"), { name, price: Number(price) });
            alert("প্রোডাক্ট যোগ হয়েছে!");
            document.getElementById("p-name").value = "";
            document.getElementById("p-price").value = "";
        } else {
            alert("নাম এবং দাম লিখুন!");
        }
    });

    // ২. রিয়েল-টাইম ডাটা ডিসপ্লে
    onSnapshot(collection(db, "products"), (snap) => {
        const list = document.getElementById("products-list");
        list.innerHTML = "";
        snap.forEach((d) => {
            const p = d.data();
            list.innerHTML += `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <p>৳${p.price}</p>
                    <button class="delete-btn" data-id="${d.id}">Delete</button>
                </div>`;
        });
        
        // ডিলিট ইভেন্ট হ্যান্ডলিং
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.onclick = async (e) => {
                await deleteDoc(doc(db, "products", e.target.getAttribute("data-id")));
            };
        });
    });
</script>
