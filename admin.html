<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIXORA Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold mb-6">Manage Products</h2>
        
        <div class="bg-white p-6 rounded shadow mb-8 grid grid-cols-2 gap-4">
            <input id="p-name" placeholder="Product Name" class="border p-2 w-full rounded">
            <input id="p-price" type="number" placeholder="Price" class="border p-2 w-full rounded">
            <button id="add-product-btn" class="col-span-2 bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Add Product</button>
        </div>

        <div id="products-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAumbU-7Eaaw0ivNrbBEB8PutkWvQSGBMQ",
            authDomain: "pixora-21c62.firebaseapp.com",
            projectId: "pixora-21c62",
            storageBucket: "pixora-21c62.firebasestorage.app",
            messagingSenderId: "997778712038",
            appId: "1:997778712038:web:25791b604601b456e6a227"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // অ্যাড প্রোডাক্ট ইভেন্ট
        document.getElementById("add-product-btn").addEventListener("click", async () => {
            const name = document.getElementById("p-name").value;
            const price = document.getElementById("p-price").value;
            
            if(name && price) {
                try {
                    await addDoc(collection(db, "products"), { name, price: Number(price) });
                    document.getElementById("p-name").value = "";
                    document.getElementById("p-price").value = "";
                    alert("Product added successfully!");
                } catch (e) {
                    console.error("Error adding document: ", e);
                }
            } else {
                alert("Please fill in both fields.");
            }
        });

        // রিয়েল-টাইম লিস্ট লোড
        onSnapshot(collection(db, "products"), (snapshot) => {
            const list = document.getElementById("products-list");
            list.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const p = docSnap.data();
                const div = document.createElement("div");
                div.className = "bg-white p-4 rounded shadow border";
                div.innerHTML = `
                    <h3 class="font-bold">${p.name}</h3>
                    <p class="text-blue-600 mb-2">৳${p.price}</p>
                    <button onclick="deleteDoc(doc(db, 'products', '${docSnap.id}'))" class="text-red-500 text-sm hover:underline">Delete</button>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
